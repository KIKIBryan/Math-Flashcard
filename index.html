<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 手機 App 全螢幕模式標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    
    <title>幾何定理記憶卡</title>
    
    <style>
        /* 100% 內建單機樣式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
 
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overscroll-behavior-y: none;
        }
 
        /* 隱藏區塊用 */
        .hidden {
            display: none !important;
        }
 
        /* 標題區 */
        header {
            background-color: #4f46e5;
            color: white;
            padding: 1.25rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
            position: relative;
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        header p {
            color: #c7d2fe;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .back-btn {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }
 
        /* 主內容區 */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }

        /* ----- 首頁選單樣式 ----- */
        #home-screen {
            width: 100%;
            max-width: 28rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .menu-btn {
            background-color: white;
            border: 2px solid #e5e7eb;
            border-radius: 1rem;
            padding: 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #374151;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }
        .menu-btn:active {
            transform: scale(0.98);
            background-color: #f9fafb;
        }
        .menu-icon {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .menu-icon svg {
            width: 2rem;
            height: 2rem;
            color: #4f46e5;
        }
        .update-area {
            margin-top: 2rem;
            text-align: center;
        }
        .update-btn {
            background-color: #e0e7ff;
            color: #4338ca;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .update-btn:active {
            transform: scale(0.95);
        }

        /* ----- 卡片介面樣式 ----- */
        #card-screen {
            width: 100%;
            max-width: 28rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
